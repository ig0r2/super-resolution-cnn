patch_size: 192
batch_size: 16
epochs: 3500
lr: 0.0001
scheduler_step_epochs: 1000
validate_every: 200
num_workers: 4
train_preload: True
val_preload: True

models:
  - model:
      name: SR_FastEDSR_1x
      checkpoint_name: SR_FastEDSR_1x_jpeg_4_32_s
      params:
        num_blocks: 4
        nf: 32
  - model:
      name: SR_FastEDSR_1x
      checkpoint_name: SR_FastEDSR_1x_jpeg_4_64_s
      params:
        num_blocks: 4
        nf: 64
